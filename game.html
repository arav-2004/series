            width: 220px;

            flex-direction: column;
             justify-content: center;
             align-items: center;
             display: flex;
             gap: 30px;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        .card img {
            width: 200px;
             height: 300px;
             object-fit: cover;
            border-radius: 10px;
            

        }

        .card img:hover {
            transform: scale(1.05);
        }

        button {
            background-color: black;
            color: white;
            padding: 10px 15px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 10px;
            transition: 0.3s;
        }

        button:hover {
